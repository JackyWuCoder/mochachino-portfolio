<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>yuumocha's Portfolio</title>
    <link rel="icon" type="image/png" href="/images/profile/profile2.png" />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="body-container">
      <!-- Navigation Bar -->
      <div id="navbar"></div>

      <!-- Portfolio Page -->
      <div class="page-container">
        <h1>Portfolio</h1>
        <div class="tabs" role="tablist" aria-label="works filter">
          <button class="tab active" data-filter="all" type="button">
            All Works
          </button>
          <button class="tabs" data-filter="illustration" type="button">
            Illustration
          </button>
          <button class="tab" data-filter="chibi" type="button">Chibi</button>
        </div>
        <div class="works-container">
          <article class="work" data-category="illustration">
            <img src="/images/illustration/azusa.png" alt="illustration 1" />
          </article>
          <article class="work" data-category="chibi">
            <img src="/images/chibi/chibi1.png" alt="chibi 1" />
          </article>
          <article class="work" data-category="illustration">
            <img src="/images/illustration/teaparty.jpg" alt="illustration 2" />
          </article>
          <article class="work" data-category="chibi">
            <img src="/images/chibi/chibi2.jpg" alt="chibi 2" />
          </article>
          <article class="work" data-category="illustration">
            <img src="/images/illustration/azusa.png" alt="illustration 1" />
          </article>
          <article class="work" data-category="chibi">
            <img src="/images/chibi/chibi1.png" alt="chibi 1" />
          </article>
          <article class="work" data-category="illustration">
            <img src="/images/illustration/teaparty.jpg" alt="illustration 2" />
          </article>
          <article class="work" data-category="chibi">
            <img src="/images/chibi/chibi2.jpg" alt="chibi 2" />
          </article>
        </div>
      </div>

      <!-- Footer -->
      <div id="footer"></div>
    </div>
    <script src="/layout.js"></script>
    <script src="/script.js"></script>
  </body>
</html>
